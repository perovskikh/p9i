# docker-compose.ssl.yml - SSL-enabled MCP server with nginx reverse proxy
name: p9i-ssl

services:
  # Nginx SSL termination
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    environment:
      - DOMAIN=${DOMAIN:-mcp.coderweb.ru}
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      - mcp-server
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Certbot for Let's Encrypt (optional - uncomment for auto SSL renewal)
  certbot:
    image: certbot/certbot:latest
    profiles:
      - letsencrypt
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --deploy-hook \"docker restart nginx\"; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

  # MCP Server
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      # Server configuration
      - SERVER_HOST=0.0.0.0
      - P9I_API_KEY=sk-p9i-codeshift-${DOMAIN:-mcp.coderweb.ru}
      - ALLOWED_ORIGINS=https://${DOMAIN:-mcp.coderweb.ru},https://coderweb.ru,http://localhost:8501,http://localhost:8000
      # PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_prompts
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_CLUSTER_NODES=redis:6379
      # App config
      - API_KEYS__SYSTEM=sk-system-dev
      - LOG_LEVEL=INFO
      - MCP_TRANSPORT=sse
      - LLM_PROVIDER=auto
      # JWT Auth
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ENABLED=${JWT_ENABLED:-false}
      # LLM API Keys
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # UI/UX Integration
      - FIGMA_TOKEN=${FIGMA_TOKEN:-}
      - TUI_THEME=${TUI_THEME:-dark}
    volumes:
      - ./.env:/app/.env:ro
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./memory:/app/memory
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "api.context7.com:76.76.21.21"

  # Web UI
  web-ui:
    image: python:3.11-slim
    user: root
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "pip install streamlit python-dotenv httpx pydantic pyyaml redis asyncpg sqlalchemy hiredis anthropic fastmcp fastapi uvicorn -q &&
             python -m streamlit run web/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./web:/app/web
      - ./.env:/app/.env:ro
      - ./src:/app/src:ro
      - ./prompts:/app/prompts:ro
      - ./memory:/app/memory:ro
    environment:
      - PYTHONPATH=/app
    depends_on:
      - mcp-server
    restart: unless-stopped

  # PostgreSQL
  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
