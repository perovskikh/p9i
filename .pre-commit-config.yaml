# Pre-commit hooks for p9i
repos:
  - repo: local
    hooks:
      - id: adr-numbering
        name: ADR numbering validation
        entry: python3
        args:
          - -c
          - |
            import sys
            import re
            from pathlib import Path
            ADR_DIR = 'docs/explanation/adr'
            files = sorted(Path(ADR_DIR).glob('*.md'))
            files = [f for f in files if f.name not in ['ADR_INDEX.md']]
            numbers = []
            slugs = {}
            issues = []
            for f in files:
                match = re.match(r'^ADR[-_]?(\d+)-([^-]+)-', f.name)
                if match:
                    num, slug = int(match.group(1)), match.group(2).lower()
                    if num in numbers:
                        issues.append(f'Duplicate ADR number {num}: {f.name}')
                    numbers.append(num)
                    if slug in slugs:
                        issues.append(f'Duplicate topic {slug}: {f.name} vs {slugs[slug]}')
                    slugs[slug] = f.name
            if issues:
                for i in issues: print(i)
                sys.exit(1)
            print(f'ADR validation passed: {len(files)} files')
        language: system
        pass_filenames: false
        stages: [commit-msg]
