# config/settings.yaml
server:
  host: "0.0.0.0"
  port: 8000
  debug: false

storage:
  prompts: "./prompts"
  memory: "./memory"
  database_url: "postgresql+asyncpg://postgres:postgres@localhost:5432/ai_prompts"
  redis_url: "redis://localhost:6379"

api:
  rate_limit: 1000
  rate_window: 60  # seconds

defaults:
  model: "claude-sonnet-4-6"
  temperature: 0.7
  max_tokens: 4096