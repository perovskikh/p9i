{{- if .Values.mcp_server.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "p9i.fullname" . }}-secrets
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.env.ZAI_API_KEY }}
  zaiKey: {{ .Values.env.ZAI_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.ANTHROPIC_API_KEY }}
  anthropicKey: {{ .Values.env.ANTHROPIC_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.OPENROUTER_API_KEY }}
  openrouterKey: {{ .Values.env.OPENROUTER_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.MINIMAX_API_KEY }}
  minimaxKey: {{ .Values.env.MINIMAX_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.DEEPSEEK_API_KEY }}
  deepseekKey: {{ .Values.env.DEEPSEEK_API_KEY | quote }}
  {{- end }}
  {{- if .Values.env.JWT_SECRET }}
  jwtSecret: {{ .Values.env.JWT_SECRET | quote }}
  {{- end }}
  {{- if .Values.env.FIGMA_TOKEN }}
  figmaToken: {{ .Values.env.FIGMA_TOKEN | quote }}
  {{- end }}
{{- end }}
