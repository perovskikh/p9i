{{- if .Values.mcp_server.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "p9i.fullname" . }}
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
{{- if .Values.ingress.enabled }}
spec:
  tls:
    - hosts:
        - mcp.coderweb.ru
      secretName: p9i-tls
  rules:
    - host: mcp.coderweb.ru
      http:
        paths:
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "p9i.fullname" . }}
                port:
                  number: 8000
{{- end }}
{{- end }}