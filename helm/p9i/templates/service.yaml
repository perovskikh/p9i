{{- if .Values.mcp_server.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "p9i.fullname" . }}
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "p9i.labels" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
{{- end }}
