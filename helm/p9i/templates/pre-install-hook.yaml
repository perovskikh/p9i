{{- if .Values.mcp_server.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "p9i.fullname" . }}-pre-install
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "p9i.fullname" . }}-pre-install
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes", "storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "p9i.fullname" . }}-pre-install
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ include "p9i.fullname" . }}-pre-install
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "p9i.fullname" . }}-pre-install
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "p9i.fullname" . }}-pre-install
  labels:
    {{- include "p9i.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "p9i.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "p9i.fullname" . }}-pre-install
      containers:
        - name: pre-install-check
          image: rancher/kubectl:v1.29.0
          command:
            - /bin/sh
            - -c
            - |
              echo "=== Pre-install checks for p9i ==="
              echo "Checking MicroK8s storage..."
              kubectl get storageclass microk8s-hostpath 2>/dev/null || echo "WARNING: microk8s-hostpath storageclass not found"
              echo "Checking existing PVCs..."
              kubectl get pvc -n {{ .Release.Namespace }} 2>/dev/null || echo "No existing PVCs"
              echo "=== Pre-install checks completed ==="
              exit 0
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
{{- end }}