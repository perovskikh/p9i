# docker-compose.yml
services:
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # PostgreSQL (persistent data)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_prompts
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
      # Redis (hot data, cache, pub/sub)
      - REDIS_URL=redis://redis:6379
      - REDIS_CLUSTER_NODES=redis:6379
      # App config
      - API_KEYS__SYSTEM=sk-system-dev
      - LOG_LEVEL=DEBUG
      - MCP_TRANSPORT=sse
      - LLM_PROVIDER=minimax
      # JWT Auth (Phase 5)
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ENABLED=${JWT_ENABLED:-false}
    volumes:
      - ./.env:/app/.env:ro
      - ./prompts:/app/prompts
      - ./memory:/app/memory
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "api.context7.com:76.76.21.21"
    # Healthcheck removed - MCP server doesn't expose /health
    # Use: curl -X POST http://localhost:8000/mcp/json-rpc -H "Content-Type: application/json" -d '{"jsonrpc":"2.0","method":"tools/list","id":1}'

  # HTTPS Proxy (Caddy for automatic HTTPS)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - mcp-server
    restart: unless-stopped

  # PostgreSQL — persistent data (prompts, versions, projects, keys)
  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — hot data, cache, pub/sub, sessions, rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  caddy_data: