# docker-compose.yml
name: p9i

services:
  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Server host
      - SERVER_HOST=0.0.0.0
      - P9I_API_KEY=sk-p9i-codeshift-${DOMAIN:-dev}
      - ALLOWED_ORIGINS=*
      # PostgreSQL (persistent data)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/ai_prompts
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
      # Redis (hot data, cache, pub/sub)
      - REDIS_URL=redis://redis:6379
      - REDIS_CLUSTER_NODES=redis:6379
      # App config
      - API_KEYS__SYSTEM=sk-system-dev
      - LOG_LEVEL=DEBUG
      - MCP_TRANSPORT=sse
      - LLM_PROVIDER=auto  # Auto-detect: ZAI → OpenRouter → MiniMax → DeepSeek → Anthropic
      # JWT Auth (Phase 5)
      - JWT_SECRET=${JWT_SECRET:-}
      - JWT_ENABLED=${JWT_ENABLED:-false}
      # LLM API Keys (loaded from .env)
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      # UI/UX Integration
      - FIGMA_TOKEN=${FIGMA_TOKEN:-}
      - TUI_THEME=${TUI_THEME:-dark}
    volumes:
      - ./.env:/app/.env:ro
      - ./src:/app/src
      - ./prompts:/app/prompts
      - ./memory:/app/memory
      - ./config:/app/config:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "api.context7.com:76.76.21.21"

  # Web UI - Streamlit Control Panel
  web-ui:
    image: python:3.11-slim
    user: root
    working_dir: /app
    command: >
      sh -c "pip install streamlit python-dotenv httpx pydantic pyyaml redis asyncpg sqlalchemy hiredis anthropic fastmcp fastapi uvicorn -q &&
             python -m streamlit run web/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./web:/app/web
      - ./.env:/app/.env:ro
      - ./src:/app/src:ro
      - ./prompts:/app/prompts:ro
      - ./memory:/app/memory:ro
    environment:
      - PYTHONPATH=/app
    depends_on:
      - mcp-server
    restart: unless-stopped

  # PostgreSQL — persistent data (prompts, versions, projects, keys)
  db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=ai_prompts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — hot data, cache, pub/sub, sessions, rate limiting
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: